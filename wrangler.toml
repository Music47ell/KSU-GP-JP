name = "ksu-gp-jp"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"
workers_dev = false
[assets]
directory = "./dist"
binding = "ASSETS"

